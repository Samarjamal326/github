name: Daily Web Dev Tip

on:
  schedule:
    # Runs twice a day
    - cron: '0 6 * * *'   # 11:30 AM IST
    - cron: '0 18 * * *'  # 11:30 PM IST
  workflow_dispatch:

jobs:
  add-tip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Pick and append a daily web dev tip
        run: |
          # Array of web dev tips
          TIPS=(
            "**HTML:** Always use semantic tags like <article>, <section>, <nav>, and <footer> instead of generic <div>s — it improves accessibility and SEO."
            "**CSS:** Use CSS custom properties (variables) like \`--primary-color: #3498db\` to keep your styles consistent and easy to update."
            "**JavaScript:** \`const\` doesn't mean the value is immutable — for objects and arrays, the contents can still change. Use \`Object.freeze()\` if you truly want immutability."
            "**CSS:** \`Flexbox\` is best for 1D layouts (rows or columns). Use \`CSS Grid\` when you need control over both rows and columns at the same time."
            "**HTML:** The \`alt\` attribute on images isn't optional — it's critical for screen readers and is displayed when the image fails to load."
            "**JavaScript:** Use \`===\` (strict equality) instead of \`==\` (loose equality) to avoid unexpected type coercion bugs."
            "**CSS:** \`position: sticky\` is a hybrid of relative and fixed — the element stays in the flow until it hits a scroll threshold, then sticks."
            "**JavaScript:** Arrow functions don't have their own \`this\` — they inherit it from the surrounding scope. This makes them ideal for callbacks."
            "**HTML:** Use \`<label for='inputId'>\` to link labels to inputs — clicking the label will focus the input, improving usability."
            "**CSS:** \`box-sizing: border-box\` makes width calculations intuitive — padding and border are included in the element's total width."
          )

          # Pick tip based on current timestamp
          INDEX=$(( $(date +%s) % ${#TIPS[@]} ))
          TIP="${TIPS[$INDEX]}"
          DATE=$(date +"%Y-%m-%d %H:%M:%S")

          echo "" >> README.md
          echo "### 🗓️ $DATE" >> README.md
          echo "" >> README.md
          echo "> 💡 $TIP" >> README.md
          echo "" >> README.md
          echo "---" >> README.md

      - name: Commit and push tip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "💡 Web dev tip update — $(date +%Y-%m-%d_%H-%M-%S)"
          git push
